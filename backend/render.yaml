# Render.com auto-deploy configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: olaja-tort-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: olaja-tort-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: olaja-tort-db
    plan: free
    databaseName: olaja_db
    user: olaja_user
    ipAllowList: []
